services:
  mqtt:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
    restart: unless-stopped

  core:
    build: .
    volumes:
      - ./data:/app/data
      - ./skills:/app/skills
    environment:
      - ANIMA_LLM_API_KEY=${ANIMA_LLM_API_KEY}
      - ANIMA_LLM_MODEL=${ANIMA_LLM_MODEL:-gpt-4o}
      - ANIMA_LLM_BASE_URL=${ANIMA_LLM_BASE_URL:-}
      - ANIMA_LLM_DISABLE_THINKING=${ANIMA_LLM_DISABLE_THINKING:-false}
      - ANIMA_MQTT_HOST=localhost
      - ANIMA_MQTT_PORT=1883
    depends_on:
      - mqtt
    network_mode: host
    restart: unless-stopped
