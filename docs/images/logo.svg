<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a5b4fc"/>
      <stop offset="100%" style="stop-color:#67e8f9"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#6366f1" flood-opacity="0.4"/>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)" filter="url(#shadow)"/>
  <!-- Inner ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#glow)" stroke-width="2" opacity="0.5"/>
  <!-- Circuit nodes (hardware) -->
  <circle cx="256" cy="100" r="8" fill="#a5b4fc"/>
  <circle cx="400" cy="200" r="8" fill="#a5b4fc"/>
  <circle cx="380" cy="340" r="8" fill="#a5b4fc"/>
  <circle cx="132" cy="340" r="8" fill="#a5b4fc"/>
  <circle cx="112" cy="200" r="8" fill="#a5b4fc"/>
  <!-- Circuit lines connecting to center soul -->
  <line x1="256" y1="100" x2="256" y2="180" stroke="#a5b4fc" stroke-width="2" opacity="0.6"/>
  <line x1="400" y1="200" x2="330" y2="230" stroke="#a5b4fc" stroke-width="2" opacity="0.6"/>
  <line x1="380" y1="340" x2="310" y2="300" stroke="#a5b4fc" stroke-width="2" opacity="0.6"/>
  <line x1="132" y1="340" x2="202" y2="300" stroke="#a5b4fc" stroke-width="2" opacity="0.6"/>
  <line x1="112" y1="200" x2="182" y2="230" stroke="#a5b4fc" stroke-width="2" opacity="0.6"/>
  <!-- Central soul orb -->
  <circle cx="256" cy="256" r="70" fill="#1e1b4b" opacity="0.5"/>
  <circle cx="256" cy="256" r="55" fill="none" stroke="#a5b4fc" stroke-width="1.5" opacity="0.7">
    <animateTransform attributeName="transform" type="rotate" from="0 256 256" to="360 256 256" dur="20s" repeatCount="indefinite"/>
  </circle>
  <circle cx="256" cy="256" r="40" fill="none" stroke="#67e8f9" stroke-width="1" opacity="0.5">
    <animateTransform attributeName="transform" type="rotate" from="360 256 256" to="0 256 256" dur="15s" repeatCount="indefinite"/>
  </circle>
  <!-- "A" letterform -->
  <text x="256" y="278" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="80" font-weight="700" fill="white" filter="url(#innerGlow)">A</text>
  <!-- Pulse dots on circuit nodes -->
  <circle cx="256" cy="100" r="4" fill="white" opacity="0.8">
    <animate attributeName="r" values="4;8;4" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="200" r="4" fill="white" opacity="0.8">
    <animate attributeName="r" values="4;8;4" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="380" cy="340" r="4" fill="white" opacity="0.8">
    <animate attributeName="r" values="4;8;4" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="132" cy="340" r="4" fill="white" opacity="0.8">
    <animate attributeName="r" values="4;8;4" dur="2.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="112" cy="200" r="4" fill="white" opacity="0.8">
    <animate attributeName="r" values="4;8;4" dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2.8s" repeatCount="indefinite"/>
  </circle>
</svg>